; Webots controller runtime configuration.
;
; Tells Webots which Python interpreter to use for this controller. Must be
; absolute and point at your project environment, otherwise Webots falls back to
; /usr/bin/python3 which doesn't see the venv-installed packages.
;
; Edit the COMMAND line to match your local interpreter path before running.

[python]
; Ubuntu / Linux example for the local conda env created from environment.yml:
COMMAND = /home/darian/miniconda3/envs/humanoid_robot_vlm_darian/bin/python3

; If you move the project, update the path above.
; On Windows the equivalent would be e.g.
;   COMMAND = C:\path\to\repo\.venv\Scripts\python.exe
